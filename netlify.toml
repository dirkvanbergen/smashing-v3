# Netlify build configuration for Smashing '72 (Astro static site)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Match your local Node version. Astro 5 needs Node 18.20+, 20.3+, or 22+.
  NODE_VERSION = "22"

# Security / caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long-cache Astro's fingerprinted assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
