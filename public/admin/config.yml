# Decap CMS configuration for Smashing '72
# Docs: https://decapcms.org/docs/
#
# Backend: Git Gateway + Netlify Identity — editors log in with an email
# invite, no GitHub account required. Enable both in the Netlify dashboard
# (see README).

backend:
  name: git-gateway
  branch: main # the branch Decap commits content to

# Uncomment to test the CMS locally with `npx decap-server` (see README).
# local_backend: true

# Where uploaded media is stored / how it's referenced in markdown.
# Matches the string image paths used by the Astro content collections.
media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # --- Site settings (singletons) --------------------------------------------
  - name: "settings"
    label: "Site settings"
    editor:
      preview: false
    files:
      - name: "home"
        label: "Home page"
        file: "src/data/home.json"
        description: "Hero photo, headings and intro text on the front page."
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow (small text above the title)", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Intro text", name: "text", widget: "text" }
              - { label: "Photo (shown on the right)", name: "image", widget: "image", required: false }
              - { label: "Photo alt text", name: "imageAlt", widget: "string", required: false }
              - { label: "Primary button label", name: "primaryLabel", widget: "string", required: false }
              - { label: "Primary button link", name: "primaryHref", widget: "string", required: false, default: "/join" }
              - { label: "Secondary button label", name: "secondaryLabel", widget: "string", required: false }
              - { label: "Secondary button link", name: "secondaryHref", widget: "string", required: false, default: "/teams" }
          - label: "News section"
            name: "news"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
          - label: "Matches section"
            name: "matches"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
          - label: "Shop (news sidebar)"
            name: "shop"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text", required: false }
              - label: "Links"
                name: "links"
                widget: "list"
                label_singular: "Link"
                summary: "{{fields.label}}"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
          - label: "Sponsors section (news sidebar)"
            name: "sponsors"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
      # Hero (top banner) text + optional image for the other pages.
      - name: "pages"
        label: "Page headers"
        file: "src/data/pages.json"
        description: "Hero text and optional image for About, Teams, News, Join and Contact."
        fields:
          - label: "About page"
            name: "about"
            widget: "object"
            collapsed: true
            fields: &pageHeroFields
              - { label: "Eyebrow (small text above the title)", name: "eyebrow", widget: "string", required: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Intro text", name: "text", widget: "text", required: false }
              - { label: "Image (optional, shown on the right)", name: "image", widget: "image", required: false }
              - { label: "Image alt text", name: "imageAlt", widget: "string", required: false }
          - label: "Teams page"
            name: "teams"
            widget: "object"
            collapsed: true
            fields: *pageHeroFields
          - label: "News page"
            name: "news"
            widget: "object"
            collapsed: true
            fields: *pageHeroFields
          - label: "Join page"
            name: "join"
            widget: "object"
            collapsed: true
            fields: *pageHeroFields
          - label: "Contact page"
            name: "contact"
            widget: "object"
            collapsed: true
            fields: *pageHeroFields

  # --- Sponsors --------------------------------------------------------------
  # Shown in the home-page news sidebar. Add each sponsor with a logo + link.
  - name: "sponsors"
    label: "Sponsors"
    label_singular: "Sponsor"
    folder: "src/content/sponsors"
    create: true
    identifier_field: "name"
    slug: "{{slug}}"
    summary: "{{name}}"
    sortable_fields: ["order", "name"]
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Logo", name: "logo", widget: "image", required: false }
      - { label: "Website URL", name: "url", widget: "string", required: false }
      - { label: "Sort order", name: "order", widget: "number", value_type: "int", default: 99 }

  # --- Announcements ---------------------------------------------------------
  # Temporary home-page notices (e.g. a party). Hidden automatically once the
  # date has passed. When more than one is active they alternate colours and
  # image sides on the page.
  - name: "announcements"
    label: "Announcements"
    label_singular: "Announcement"
    folder: "src/content/announcements"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date (hidden after this day)", name: "date", widget: "datetime", picker_utc: false }
      - { label: "Poster / image", name: "image", widget: "image", required: false, hint: "Click-to-enlarge poster. Portrait posters work well." }
      - { label: "Description", name: "body", widget: "markdown" }

  # --- News posts ------------------------------------------------------------
  - name: "news"
    label: "News"
    label_singular: "News post"
    folder: "src/content/news"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", picker_utc: false }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Cover image", name: "cover", widget: "image", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # --- Teams -----------------------------------------------------------------
  - name: "teams"
    label: "Teams"
    label_singular: "Team"
    folder: "src/content/teams"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} ({{level}})"
    sortable_fields: ["order", "title"]
    fields:
      - { label: "Team name", name: "title", widget: "string" }
      - { label: "Sort order", name: "order", widget: "number", value_type: "int", default: 99 }
      - { label: "Level / league", name: "level", widget: "string" }
      - { label: "Coach", name: "coach", widget: "string", required: false }
      - { label: "Practice times", name: "practice", widget: "string", required: false }
      - { label: "Team photo", name: "photo", widget: "image", required: false }
      - { label: "Instagram URL", name: "instagram", widget: "string", required: false, hint: "Full link to the team's Instagram profile." }
      - label: "Nevobo schedule feed URL"
        name: "scheduleUrl"
        widget: "string"
        required: false
        hint: "Per-team programma.rss, e.g. https://api.nevobo.nl/export/team/CKL7J75/heren/1/programma.rss"
      - label: "Nevobo results feed URL"
        name: "resultsUrl"
        widget: "string"
        required: false
        hint: "Per-team resultaten.rss (not shown yet — reserved for when results appear)."
      - label: "Players"
        name: "players"
        widget: "list"
        required: false
        label_singular: "Player"
        summary: "{{fields.number}} {{fields.name}}"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Role / position", name: "role", widget: "string", required: false }
          - { label: "Shirt number", name: "number", widget: "number", value_type: "int", required: false }
      - { label: "Description", name: "body", widget: "markdown", required: false }

  # NOTE: The match schedule is NOT edited here — fixtures come from the Nevobo
  # RSS feed automatically (see src/lib/matches.ts). There is no "matches"
  # collection on purpose.
